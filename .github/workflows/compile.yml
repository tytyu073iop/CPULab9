name: Compile C++ OpenMP Project

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install OpenMP
      run: sudo apt-get update && sudo apt-get install -y libomp-dev

    - name: Configure CMake
      run: cmake -B build

    - name: Build
      run: cmake --build build

    - name: List executables
      run: ls -la build/src/